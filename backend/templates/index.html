<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影视知识图谱探索系统</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
<div id="app">
  <header>
    <h1>影视知识图谱探索系统</h1>
    <div class="stats-bar" id="stats-bar">
      <span>电影: <em id="stat-movies">--</em></span>
      <span>人物: <em id="stat-persons">--</em></span>
      <span>类型: <em id="stat-genres">--</em></span>
      <span>关系: <em id="stat-relations">--</em></span>
    </div>
  </header>

  <div id="main-layout">
    <aside id="sidebar">
      <div class="panel" id="search-panel">
        <h3>搜索</h3>
        <input type="text" id="search-input" placeholder="输入电影名或人名..." autocomplete="off">
        <div id="search-results"></div>
      </div>

      <div class="panel" id="filter-panel">
        <h3>筛选</h3>
        <div class="filter-row">
          <label>类型</label>
          <select id="filter-genre"><option value="">全部</option></select>
        </div>
        <div class="filter-row">
          <label>国家</label>
          <select id="filter-country"><option value="">全部</option></select>
        </div>
        <div class="filter-row">
          <label>年份</label>
          <input type="number" id="filter-year-from" placeholder="从" min="1900" max="2026" style="width:60px">
          <span>—</span>
          <input type="number" id="filter-year-to" placeholder="到" min="1900" max="2026" style="width:60px">
        </div>
        <button id="filter-apply">筛选</button>
      </div>

      <div class="panel" id="recommend-panel">
        <h3>热门推荐</h3>
        <div id="recommend-list"></div>
      </div>
    </aside>

    <main id="graph-area">
      <div id="graph-container"></div>
      <div class="graph-legend">
        <span class="legend-item"><span class="legend-dot movie"></span> 电影</span>
        <span class="legend-item"><span class="legend-dot person"></span> 人物</span>
        <span class="legend-item"><span class="legend-dot genre"></span> 类型</span>
        <span class="legend-item"><span class="legend-dot country"></span> 国家</span>
        <div class="graph-relation-toggle">
          <button class="rel-btn active" data-mode="person" onclick="GraphVis.setRelationMode('person')">人物关系</button>
          <button class="rel-btn" data-mode="attr" onclick="GraphVis.setRelationMode('attr')">属性关系</button>
          <button class="rel-btn" data-mode="all" onclick="GraphVis.setRelationMode('all')">全部关系</button>
        </div>
      </div>
      <div class="graph-tooltip" id="graph-tooltip" style="display:none"></div>
    </main>
  </div>

  <div id="path-panel">
    <h3>关系路径分析</h3>
    <input type="text" id="path-from" placeholder="起点名称">
    <span class="arrow">→</span>
    <input type="text" id="path-to" placeholder="终点名称">
    <button id="path-search">查询路径</button>
    <div id="path-result"></div>
  </div>
</div>

<script src="/static/js/search.js"></script>
<script src="/static/js/graph.js"></script>
<script src="/static/js/recommend.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
