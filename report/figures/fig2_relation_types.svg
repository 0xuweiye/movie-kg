<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 370" width="640" height="370">
  <defs>
    <style>
      text { font-family: 'Times New Roman', serif; font-size: 11.5px; fill: #222; }
      .title { font-size: 13px; font-weight: bold; }
      .entity { fill: #f0f4f8; stroke: #3a6b8c; stroke-width: 1.6; rx: 10; ry: 10; }
      .attr { fill: #fafbfc; stroke: #8aadc4; stroke-width: 1.2; rx: 8; ry: 8; }
      .solid { stroke: #3a6b8c; stroke-width: 1.3; fill: none; marker-end: url(#arrow-solid); }
      .dashed { stroke: #c0392b; stroke-width: 1.2; fill: none; stroke-dasharray: 8,4; }
      .rel-label { font-size: 9px; fill: #555; }
    </style>
    <marker id="arrow-solid" viewBox="0 0 10 8" refX="0" refY="4" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M10,0 L0,4 L10,8 Z" fill="#3a6b8c"/>
    </marker>
  </defs>

  <rect width="640" height="370" fill="#fff"/>

  <!-- Person (left) -->
  <rect class="entity" x="28" y="162" width="90" height="46"/>
  <text x="73" y="182" text-anchor="middle" class="title">Person</text>
  <text x="73" y="198" text-anchor="middle" style="font-size:9px;fill:#666;">人物</text>

  <!-- Movie (center) -->
  <rect class="entity" x="275" y="100" width="90" height="46"/>
  <text x="320" y="120" text-anchor="middle" class="title">Movie</text>
  <text x="320" y="136" text-anchor="middle" style="font-size:9px;fill:#666;">电影</text>

  <!-- Genre (top right) -->
  <rect class="attr" x="460" y="45" width="100" height="36"/>
  <text x="510" y="60" text-anchor="middle" class="title">Genre</text>
  <text x="510" y="74" text-anchor="middle" style="font-size:9px;fill:#666;">类型</text>

  <!-- Country -->
  <rect class="attr" x="460" y="100" width="100" height="36"/>
  <text x="510" y="115" text-anchor="middle" class="title">Country</text>
  <text x="510" y="129" text-anchor="middle" style="font-size:9px;fill:#666;">国家/地区</text>

  <!-- Language -->
  <rect class="attr" x="460" y="155" width="100" height="36"/>
  <text x="510" y="170" text-anchor="middle" class="title">Language</text>
  <text x="510" y="184" text-anchor="middle" style="font-size:9px;fill:#666;">语言</text>

  <!-- Year -->
  <rect class="attr" x="460" y="210" width="100" height="36"/>
  <text x="510" y="225" text-anchor="middle" class="title">Year</text>
  <text x="510" y="239" text-anchor="middle" style="font-size:9px;fill:#666;">年份</text>

  <!-- Person → Movie edges (solid) -->
  <path class="solid" d="M118,170 C150,170 200,130 275,130"/>
  <text x="180" y="138" class="rel-label">ACTS_IN / DIRECTED / WROTE</text>

  <!-- Movie → Genre -->
  <path class="solid" d="M365,115 C415,95 440,70 460,63"/>
  <text x="405" y="90" class="rel-label">BELONGS_TO</text>

  <!-- Movie → Country -->
  <path class="solid" d="M365,125 L460,118"/>

  <!-- Movie → Language -->
  <path class="solid" d="M365,132 L460,173"/>

  <!-- Movie → Year -->
  <path class="solid" d="M365,140 L460,228"/>

  <!-- Movie attribute edges -->
  <path class="solid" d="M365,125 L460,118"/>
  <path class="solid" d="M365,132 L460,173"/>
  <path class="solid" d="M365,140 L460,228"/>

  <!-- COLLABORATED_WITH (dashed, reflexive on Person) -->
  <path class="dashed" d="M35,208 C20,280 126,280 111,208"/>
  <text x="73" y="265" text-anchor="middle" class="rel-label">COLLABORATED_WITH</text>

  <!-- SIMILAR_TO (dashed, reflexive on Movie) -->
  <path class="dashed" d="M280,146 C260,200 380,200 360,146"/>
  <text x="320" y="195" text-anchor="middle" class="rel-label">SIMILAR_TO</text>

  <!-- Legend -->
  <rect x="28" y="292" width="220" height="52" fill="#fafbfc" stroke="#ddd" stroke-width="1" rx="4"/>
  <text x="48" y="310" style="font-size:10px;fill:#333;">── 直接抽取关系 (explicit)</text>
  <line x1="48" y1="327" x2="80" y2="327" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="8,4"/>
  <text x="88" y="332" style="font-size:10px;fill:#333;">- - 推理生成关系 (inferred)</text>

  <text x="320" y="355" text-anchor="middle" style="font-size:11px;fill:#555;">图2 &emsp;知识图谱关系类型设计</text>
</svg>
