<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 380" width="540" height="380">
  <defs>
    <style>
      text { font-family: 'Times New Roman', serif; font-size: 12px; fill: #222; }
      .title { font-size: 13px; font-weight: bold; }
      .box { fill: #f0f4f8; stroke: #3a6b8c; stroke-width: 1.6; rx: 6; ry: 6; }
      .box-dark { fill: #e2eaf2; stroke: #2c5282; stroke-width: 1.6; rx: 6; ry: 6; }
      .box-out { fill: #fafbfc; stroke: #5a8aad; stroke-width: 1.3; rx: 6; ry: 6; }
      .decision { fill: #fff; stroke: #3a6b8c; stroke-width: 1.5; rx: 2; ry: 2; }
      .arrow { stroke: #3a6b8c; stroke-width: 1.3; fill: none; marker-end: url(#arr); }
      .label { font-size: 10px; fill: #555; }
    </style>
    <marker id="arr" viewBox="0 0 10 8" refX="0" refY="4" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M10,0 L0,4 L10,8 Z" fill="#3a6b8c"/>
    </marker>
  </defs>

  <rect width="540" height="380" fill="#fff"/>

  <!-- Start -->
  <rect class="box-dark" x="180" y="18" width="180" height="40"/>
  <text x="270" y="35" text-anchor="middle" class="title">Top250 列表页</text>
  <text x="270" y="49" text-anchor="middle" class="label">start_urls[0]</text>

  <!-- Arrow -->
  <path class="arrow" d="M270,58 L270,85"/>
  <text x="282" y="74" class="label">GET request</text>

  <!-- Parse -->
  <rect class="box" x="180" y="85" width="180" height="40"/>
  <text x="270" y="102" text-anchor="middle" class="title">div.item → 解析条目</text>
  <text x="270" y="116" text-anchor="middle" class="label">25 films per page</text>

  <!-- Arrow -->
  <path class="arrow" d="M270,125 L270,152"/>

  <!-- Detail page -->
  <rect class="box-dark" x="180" y="152" width="180" height="40"/>
  <text x="270" y="169" text-anchor="middle" class="title">电影详情页</text>
  <text x="270" y="183" text-anchor="middle" class="label">跟随 URL 链接</text>

  <!-- Split arrows -->
  <path class="arrow" d="M270,192 L270,210 L90,210 L90,235"/>
  <path class="arrow" d="M270,192 L270,210 L450,210 L450,235"/>

  <!-- MovieItem -->
  <rect class="box-out" x="30" y="235" width="130" height="48"/>
  <text x="95" y="253" text-anchor="middle" class="title">MovieItem</text>
  <text x="95" y="269" text-anchor="middle" class="label">14 fields</text>

  <!-- PersonItem -->
  <rect class="box-out" x="375" y="235" width="130" height="48"/>
  <text x="440" y="253" text-anchor="middle" class="title">PersonItem</text>
  <text x="440" y="269" text-anchor="middle" class="label">6 fields</text>

  <!-- Merge arrows -->
  <path class="arrow" d="M95,283 L95,305 L180,305"/>
  <path class="arrow" d="M440,283 L440,305 L360,305"/>
  <path class="arrow" d="M180,305 L180,315 L360,315 L360,305"/>

  <!-- Output -->
  <rect class="box-dark" x="150" y="305" width="240" height="40"/>
  <text x="270" y="322" text-anchor="middle" class="title">Feed Export → JSON Lines</text>
  <text x="270" y="336" text-anchor="middle" class="label">movies.jsonl + persons.jsonl</text>

  <!-- Pagination loop -->
  <path class="arrow" d="M360,105 C420,105 470,70 470,38 L470,25 L380,25"/>
  <text x="460" y="72" class="label">span.next a</text>
  <text x="465" y="84" class="label">(翻页)</text>

  <text x="270" y="368" text-anchor="middle" style="font-size:11px;fill:#555;">图3 &emsp;Scrapy 爬虫数据流</text>
</svg>
