<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" width="520" height="340">
  <defs>
    <style>
      text { font-family: 'Times New Roman', serif; font-size: 13px; fill: #222; }
      .title { font-size: 14px; font-weight: bold; }
      .label-en { font-size: 10px; fill: #666; }
      .box { fill: #f7f9fc; stroke: #3a6b8c; stroke-width: 1.8; rx: 6; ry: 6; }
      .box-leaf { fill: #eef3f8; stroke: #5a8aad; stroke-width: 1.4; rx: 4; ry: 4; }
      .line { stroke: #3a6b8c; stroke-width: 1.4; fill: none; }
    </style>
  </defs>

  <rect width="520" height="340" fill="#fff"/>

  <!-- Root -->
  <rect class="box" x="150" y="20" width="220" height="42"/>
  <text x="260" y="38" text-anchor="middle" class="title">知识图谱本体 (Ontology)</text>
  <text x="260" y="52" text-anchor="middle" class="label-en">Entity Types · 6 classes</text>

  <!-- Level 1: connections from root -->
  <path class="line" d="M200,62 L200,90 L100,90 L100,110"/>
  <path class="line" d="M240,62 L240,110"/>
  <path class="line" d="M280,62 L280,90 L380,90 L380,110"/>
  <path class="line" d="M320,62 L320,90 L480,90 L480,110"/>

  <!-- Movie -->
  <rect class="box-leaf" x="155" y="110" width="170" height="40"/>
  <text x="240" y="128" text-anchor="middle">Movie 电影</text>
  <text x="240" y="143" text-anchor="middle" class="label-en">title · year · rating · duration · douban_id</text>

  <!-- Person -->
  <rect class="box-leaf" x="40" y="110" width="170" height="40"/>
  <text x="125" y="128" text-anchor="middle">Person 人物</text>
  <text x="125" y="143" text-anchor="middle" class="label-en">name · gender · birth_year · role</text>

  <!-- Genre -->
  <rect class="box-leaf" x="295" y="110" width="170" height="40"/>
  <text x="380" y="128" text-anchor="middle">Genre 类型</text>
  <text x="380" y="143" text-anchor="middle" class="label-en">name</text>

  <!-- Second row: Country, Language, Year -->
  <path class="line" d="M260,150 L260,205"/>
  <path class="line" d="M260,180 L100,180 L100,205"/>
  <path class="line" d="M260,180 L420,180 L420,205"/>

  <!-- Country -->
  <rect class="box-leaf" x="15" y="205" width="170" height="36"/>
  <text x="100" y="222" text-anchor="middle">Country 国家/地区</text>
  <text x="100" y="235" text-anchor="middle" class="label-en">name</text>

  <!-- Language -->
  <rect class="box-leaf" x="175" y="205" width="170" height="36"/>
  <text x="260" y="222" text-anchor="middle">Language 语言</text>
  <text x="260" y="235" text-anchor="middle" class="label-en">name</text>

  <!-- Year -->
  <rect class="box-leaf" x="335" y="205" width="170" height="36"/>
  <text x="420" y="222" text-anchor="middle">Year 年份</text>
  <text x="420" y="235" text-anchor="middle" class="label-en">value</text>

  <!-- Caption -->
  <text x="260" y="320" text-anchor="middle" style="font-size:11px; fill:#555;">图1 &emsp;知识图谱本体层实体类型设计</text>
</svg>
