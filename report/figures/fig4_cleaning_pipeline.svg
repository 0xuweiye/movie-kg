<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <style>
      text { font-family: 'Times New Roman', serif; font-size: 11px; fill: #222; }
      .title { font-size: 12px; font-weight: bold; }
      .box { fill: #f0f4f8; stroke: #3a6b8c; stroke-width: 1.4; rx: 5; ry: 5; }
      .diamond { fill: #fff; stroke: #3a6b8c; stroke-width: 1.4; }
      .fail { fill: #fdf2f2; stroke: #c0392b; stroke-width: 1.2; rx: 4; ry: 4; }
      .arrow { stroke: #3a6b8c; stroke-width: 1.2; fill: none; marker-end: url(#arr2); }
      .flow-label { font-size: 9px; fill: #555; }
    </style>
    <marker id="arr2" viewBox="0 0 10 8" refX="0" refY="4" markerWidth="6" markerHeight="5" orient="auto">
      <path d="M10,0 L0,4 L10,8 Z" fill="#3a6b8c"/>
    </marker>
  </defs>

  <rect width="600" height="220" fill="#fff"/>

  <!-- Step 1: raw JSONL -->
  <rect class="box" x="15" y="40" width="115" height="42"/>
  <text x="72" y="57" text-anchor="middle" class="title">raw JSONL</text>
  <text x="72" y="73" text-anchor="middle" class="flow-label">原始爬取输出</text>

  <path class="arrow" d="M130,61 L160,61"/>

  <!-- Decision 1: JSON parse -->
  <polygon class="diamond" points="195,42 235,61 195,80 155,61"/>
  <text x="195" y="58" text-anchor="middle" style="font-size:9px;">JSON</text>
  <text x="195" y="69" text-anchor="middle" style="font-size:9px;">解析?</text>

  <path class="arrow" d="M235,61 L268,61"/>
  <text x="243" y="56" class="flow-label">成功</text>

  <path d="M195,80 L195,100 L60,100 L60,118" stroke="#c0392b" stroke-width="1.1" fill="none"/>
  <text x="110" y="96" style="font-size:9px;fill:#c0392b;">解析失败</text>
  <rect class="fail" x="25" y="118" width="70" height="28"/>
  <text x="60" y="136" text-anchor="middle" style="font-size:9px;fill:#c0392b;">丢弃该行</text>

  <!-- Step 2: dedup -->
  <polygon class="diamond" points="298,42 338,61 298,80 258,61"/>
  <text x="298" y="58" text-anchor="middle" style="font-size:9px;">ID</text>
  <text x="298" y="69" text-anchor="middle" style="font-size:9px;">去重?</text>

  <path class="arrow" d="M338,61 L370,61"/>
  <text x="346" y="56" class="flow-label">首次</text>

  <path d="M298,80 L298,100 L270,100 L270,118" stroke="#c0392b" stroke-width="1.1" fill="none"/>
  <text x="285" y="96" style="font-size:9px;fill:#c0392b;">重复</text>
  <rect class="fail" x="235" y="118" width="70" height="28"/>
  <text x="270" y="136" text-anchor="middle" style="font-size:9px;fill:#c0392b;">丢弃重复</text>

  <!-- Step 3: normalize -->
  <rect class="box" x="370" y="40" width="115" height="42"/>
  <text x="427" y="57" text-anchor="middle" class="title">类型标准化</text>
  <text x="427" y="73" text-anchor="middle" class="flow-label">同义词映射表</text>

  <path class="arrow" d="M485,61 L515,61"/>

  <!-- Step 4: missing values -->
  <rect class="box" x="515" y="40" width="70" height="42"/>
  <text x="550" y="57" text-anchor="middle" class="title">缺值处理</text>
  <text x="550" y="73" text-anchor="middle" class="flow-label">None/""</text>

  <!-- Output -->
  <rect class="box" x="250" y="168" width="100" height="32"/>
  <text x="300" y="188" text-anchor="middle" class="title">cleaned JSONL</text>

  <path class="arrow" d="M427,82 L427,140 L300,140 L300,168"/>

  <text x="300" y="208" text-anchor="middle" style="font-size:11px;fill:#555;">图4 &emsp;数据清洗流水线</text>
</svg>
