<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 430" width="560" height="430">
  <defs>
    <style>
      text { font-family: 'Times New Roman', serif; fill: #222; font-size: 11px; }
      .title { font-size: 13px; font-weight: bold; }
      .layer { font-size: 11px; font-weight: bold; fill: #444; }
      .box-frontend { fill: #eaf2f8; stroke: #2e86c1; stroke-width: 1.5; rx: 6; ry: 6; }
      .box-backend { fill: #f0f4f8; stroke: #3a6b8c; stroke-width: 1.5; rx: 6; ry: 6; }
      .box-db { fill: #eef3f8; stroke: #2c5282; stroke-width: 1.5; rx: 6; ry: 6; }
      .box-api { fill: #fff; stroke: #5a8aad; stroke-width: 1.2; rx: 4; ry: 4; }
      .arrow { stroke: #555; stroke-width: 1.2; fill: none; marker-end: url(#arr8); }
      .arrow-label { font-size: 9px; fill: #666; }
    </style>
    <marker id="arr8" viewBox="0 0 10 8" refX="0" refY="4" markerWidth="6" markerHeight="5" orient="auto">
      <path d="M10,0 L0,4 L10,8 Z" fill="#555"/>
    </marker>
  </defs>

  <rect width="560" height="430" fill="#fff"/>

  <!-- Layer labels -->
  <text x="20" y="55" class="layer">前端层</text>
  <line x1="20" y1="60" x2="540" y2="60" stroke="#ddd" stroke-width="0.5"/>

  <text x="20" y="165" class="layer">后端层</text>
  <line x1="20" y1="170" x2="540" y2="170" stroke="#ddd" stroke-width="0.5"/>

  <text x="20" y="340" class="layer">数据层</text>
  <line x1="20" y1="345" x2="540" y2="345" stroke="#ddd" stroke-width="0.5"/>

  <!-- ===== Frontend ===== -->
  <rect class="box-frontend" x="30" y="70" width="500" height="88"/>
  <text x="280" y="90" text-anchor="middle" class="title">Browser (D3.js v7 + ECharts 5)</text>

  <rect class="box-api" x="50" y="100" width="140" height="30"/>
  <text x="120" y="119" text-anchor="middle" style="font-size:10px;">力导向图探索</text>
  <rect class="box-api" x="210" y="100" width="120" height="30"/>
  <text x="270" y="119" text-anchor="middle" style="font-size:10px;">搜索 + 分面筛选</text>
  <rect class="box-api" x="350" y="100" width="80" height="30"/>
  <text x="390" y="119" text-anchor="middle" style="font-size:10px;">电影推荐</text>
  <rect class="box-api" x="445" y="100" width="70" height="30"/>
  <text x="480" y="119" text-anchor="middle" style="font-size:10px;">路径分析</text>

  <!-- API arrow -->
  <path class="arrow" d="M280,158 L280,200"/>
  <text x="295" y="182" class="arrow-label">REST API · JSON</text>

  <!-- ===== Backend ===== -->
  <rect class="box-backend" x="30" y="200" width="500" height="130"/>
  <text x="280" y="220" text-anchor="middle" class="title">Flask Application Server</text>

  <rect class="box-api" x="50" y="235" width="100" height="28"/>
  <text x="100" y="253" text-anchor="middle" style="font-size:9px;">/api/search</text>
  <rect class="box-api" x="165" y="235" width="100" height="28"/>
  <text x="215" y="253" text-anchor="middle" style="font-size:9px;">/api/graph/*</text>
  <rect class="box-api" x="280" y="235" width="100" height="28"/>
  <text x="330" y="253" text-anchor="middle" style="font-size:9px;">/api/recommend/*</text>
  <rect class="box-api" x="395" y="235" width="100" height="28"/>
  <text x="445" y="253" text-anchor="middle" style="font-size:9px;">/api/filter</text>

  <rect class="box-api" x="120" y="275" width="240" height="28"/>
  <text x="240" y="293" text-anchor="middle" style="font-size:9px;">py2neo → neo4j driver (Cypher)</text>

  <!-- DB arrow -->
  <path class="arrow" d="M280,330 L280,370"/>

  <!-- ===== Data Layer ===== -->
  <rect class="box-db" x="130" y="370" width="300" height="44"/>
  <text x="280" y="388" text-anchor="middle" class="title">Neo4j 5.x Community Edition</text>
  <text x="280" y="404" text-anchor="middle" style="font-size:9px;fill:#666;">157 Movies · 128 Persons · 896 Relations</text>

  <text x="280" y="424" text-anchor="middle" style="font-size:11px;fill:#555;">图8 &emsp;智能应用系统架构</text>
</svg>
