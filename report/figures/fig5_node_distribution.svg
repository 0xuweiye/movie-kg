<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="520" height="300">
  <defs>
    <style>
      text { font-family: 'Times New Roman', serif; fill: #222; }
      .title { font-size: 13px; font-weight: bold; }
      .legend { font-size: 11px; }
    </style>
  </defs>

  <rect width="520" height="300" fill="#fff"/>

  <text x="260" y="24" text-anchor="middle" class="title">节点分布 (Node Distribution)</text>
  <text x="260" y="40" text-anchor="middle" style="font-size:10px;fill:#666;">Total: ~320 nodes</text>

  <!-- Pie chart: Movie=157, Person=128, Genre=21, Other=14 -->
  <!-- Total = 320 -->
  <!-- Movie: 157/320 = 49.1% = 176.6 deg -->
  <!-- Person: 128/320 = 40.0% = 144.0 deg -->
  <!-- Genre: 21/320 = 6.6% = 23.6 deg -->
  <!-- Other: 14/320 = 4.4% = 15.8 deg -->

  <!-- Movie slice (49.1%) 0 → 176.6deg -->
  <path d="M210,140 L210,50 A90,90 0 0,1 373,190 Z" fill="#3a6b8c" stroke="#fff" stroke-width="1.5"/>
  <!-- Person slice (40.0%) 176.6 → 320.6deg -->
  <path d="M210,140 L373,190 A90,90 0 0,1 152,204 Z" fill="#5a8aad" stroke="#fff" stroke-width="1.5"/>
  <!-- Genre slice (6.6%) 320.6 → 344.2deg -->
  <path d="M210,140 L152,204 A90,90 0 0,1 127,173 Z" fill="#8aadc4" stroke="#fff" stroke-width="1.5"/>
  <!-- Other slice (4.4%) 344.2 → 360deg -->
  <path d="M210,140 L127,173 A90,90 0 0,1 210,50 Z" fill="#c5d5e3" stroke="#fff" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="350" y="80" width="14" height="14" fill="#3a6b8c" rx="2"/>
  <text x="372" y="92" class="legend">Movie 电影 (157, 49.1%)</text>

  <rect x="350" y="100" width="14" height="14" fill="#5a8aad" rx="2"/>
  <text x="372" y="112" class="legend">Person 人物 (128, 40.0%)</text>

  <rect x="350" y="120" width="14" height="14" fill="#8aadc4" rx="2"/>
  <text x="372" y="132" class="legend">Genre 类型 (21, 6.6%)</text>

  <rect x="350" y="140" width="14" height="14" fill="#c5d5e3" rx="2"/>
  <text x="372" y="152" class="legend">其他 Country等 (14, 4.4%)</text>

  <!-- Movie label on slice -->
  <text x="265" y="75" text-anchor="middle" style="font-size:10px;fill:#fff;font-weight:bold;">Movie</text>
  <!-- Person label -->
  <text x="305" y="210" text-anchor="middle" style="font-size:10px;fill:#fff;font-weight:bold;">Person</text>
  <!-- Genre label -->
  <text x="140" y="185" text-anchor="middle" style="font-size:9px;fill:#333;">Genre</text>
  <!-- Other label -->
  <text x="165" y="100" text-anchor="middle" style="font-size:9px;fill:#333;">Other</text>

  <text x="260" y="285" text-anchor="middle" style="font-size:11px;fill:#555;">图5 &emsp;知识图谱节点实体类型分布</text>
</svg>
